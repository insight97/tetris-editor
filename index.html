<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Tetris Infographic Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --body-bg: #0a0a14;
    --body-fg: #e0e0f0;
    --preview-bg: #06060f;
    --canvas-border: #1e1e3a;
    --panel-bg: #0e0e1e;
    --panel-border: #1e1e3a;
    --muted: #555580;
    --muted-strong: #9090b0;
    --card-bg: #13132a;
    --input-bg: #0a0a1a;
    --input-border: #2a2a4a;
    --input-fg: #d0d0f0;
    --cell-bg: #13132a;
    --cell-hover-bg: #1e1e3a;
    --cell-border: #1e1e3a;
    --row-label: #333355;
    --col-label: #2a2a55;
    --accent: #00d7af;
    --accent-hover: #00ffcc;
    --accent-soft: #00d7af55;
    --accent-strong: #00d7af88;
  }

  body.light-mode {
    --body-bg: #eceff6;
    --body-fg: #2a3344;
    --preview-bg: #dde3ef;
    --canvas-border: #b4bfd3;
    --panel-bg: #f3f6fc;
    --panel-border: #ccd4e4;
    --muted: #67758c;
    --muted-strong: #4e5d76;
    --card-bg: #e8edf7;
    --input-bg: #f7f9fd;
    --input-border: #b6c2d8;
    --input-fg: #2a3344;
    --cell-bg: #e3e9f5;
    --cell-hover-bg: #d6deef;
    --cell-border: #c1cde2;
    --row-label: #6f7e98;
    --col-label: #617393;
    --accent: #4ca59a;
    --accent-hover: #5cb7ab;
    --accent-soft: #4ca59a66;
    --accent-strong: #4ca59a88;
  }

  body {
    background: var(--body-bg);
    color: var(--body-fg);
    font-family: 'Courier New', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── LEFT: canvas preview ── */
  #preview-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--preview-bg);
    padding: 12px;
    min-width: 0;
  }

  canvas {
    image-rendering: pixelated;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border: 1px solid var(--canvas-border);
  }

  /* ── RIGHT: panel ── */
  #panel {
    width: 340px;
    flex-shrink: 0;
    background: var(--panel-bg);
    border-left: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--panel-border);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  #theme-toggle {
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--input-fg);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    border-radius: 3px;
    padding: 4px 8px;
    cursor: pointer;
  }
  #theme-toggle:hover { border-color: var(--accent-soft); }

  #tabs {
    display: flex;
    border-bottom: 1px solid var(--panel-border);
  }
  .tab {
    flex: 1;
    padding: 8px;
    font-size: 11px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    letter-spacing: 1px;
    transition: all 0.15s;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--body-fg); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--muted-strong); }

  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--panel-border) var(--panel-bg);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin: 12px 0 6px;
  }

  /* ── piece cards ── */
  .piece-card {
    background: var(--card-bg);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .piece-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .piece-badge {
    width: 20px; height: 20px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: bold; color: #000;
    flex-shrink: 0;
  }
  .piece-name { flex: 1; color: var(--muted-strong); }
  .piece-delete {
    cursor: pointer; color: var(--muted); font-size: 13px; line-height: 1;
    padding: 0 2px;
  }
  .piece-delete:hover { color: #ff5533; }

  .piece-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .field-group label {
    display: block;
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 2px;
    letter-spacing: 1px;
  }
  .field-group input, .field-group select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--input-fg);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 3px 5px;
    border-radius: 2px;
    outline: none;
  }
  .field-group input:focus, .field-group select:focus {
    border-color: var(--accent-soft);
  }
  .field-group.full { grid-column: 1 / -1; }

  .add-btn {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1px dashed var(--input-border);
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
    margin-top: 4px;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .add-btn:hover { border-color: var(--accent-soft); color: var(--accent); }

  /* ── settled grid editor ── */
  .grid-editor-unused {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 2px;
    margin: 6px 0;
  }
  .grid-cell {
    width: 24px;
    height: 24px;
    border-radius: 3px;
    cursor: pointer;
    background: var(--cell-bg);
    border: 1px solid var(--cell-border);
    transition: background 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }
  .grid-cell:hover { border-color: #ffffff44; background: var(--cell-hover-bg); }
  .grid-cell.filled { border-color: var(--accent-strong); }
  .grid-row-label {
    font-size: 9px;
    color: var(--row-label);
    text-align: right;
    padding-right: 4px;
    width: 22px;
    flex-shrink: 0;
    line-height: 24px;
  }
  .grid-col-header {
    width: 24px;
    text-align: center;
    font-size: 8px;
    color: var(--col-label);
    flex-shrink: 0;
  }

  /* ── bottom actions ── */
  #actions {
    padding: 10px 12px;
    border-top: 1px solid var(--panel-border);
    display: flex;
    gap: 6px;
  }
  .action-btn {
    flex: 1;
    padding: 8px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 3px;
    border: none;
    transition: all 0.15s;
  }
  .action-btn.primary {
    background: var(--accent);
    color: #000;
    font-weight: bold;
  }
  .action-btn.primary:hover { background: var(--accent-hover); }
  .action-btn.secondary {
    background: var(--card-bg);
    color: var(--muted-strong);
    border: 1px solid var(--input-border);
  }
  .action-btn.secondary:hover { border-color: var(--accent-soft); color: var(--input-fg); }

  /* ── arrow stepper ── */
  .stepper {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 2px;
    overflow: hidden;
  }
  .stepper-val {
    flex: 1;
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--input-fg);
    padding: 3px 2px;
    min-width: 0;
    user-select: none;
  }
  .stepper-btn {
    width: 22px;
    height: 26px;
    background: var(--card-bg);
    border: none;
    border-left: 1px solid var(--input-border);
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.1s, color 0.1s;
  }
  .stepper-btn:first-child {
    border-left: none;
    border-right: 1px solid var(--input-border);
  }
  .stepper-btn:hover { background: var(--cell-hover-bg); color: var(--input-fg); }
  .stepper-btn:active { background: var(--input-border); }

  /* ── dpad ── */
  .dpad-pair {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dpad-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .dpad-col label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .dpad-divider {
    width: 1px;
    height: 80px;
    background: var(--panel-border);
    flex-shrink: 0;
  }
  .dpad-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 4px 0;
  }
  .dpad-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .dpad-btn {
    width: 32px;
    height: 32px;
    background: var(--card-bg);
    border: 1px solid var(--input-border);
    border-radius: 4px;
    color: var(--muted-strong);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s;
    flex-shrink: 0;
  }
  .dpad-btn:hover { background: var(--cell-hover-bg); color: var(--input-fg); border-color: #4a4a7a; }
  .dpad-btn:active { background: var(--input-border); transform: scale(0.95); }
  .ghost-btn { color: #606090; border-style: dashed; }
  .ghost-btn:hover { color: #a0a0d0; }
  .dpad-center {
    width: 48px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dpad-coords {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1;
  }

  /* scrollbar */
  #panel-body::-webkit-scrollbar { width: 4px; }
  #panel-body::-webkit-scrollbar-track { background: var(--panel-bg); }
  #panel-body::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
</style>
</head>
<body>

<div id="preview-wrap">
  <canvas id="c"></canvas>
</div>

<div id="panel">
  <div id="panel-header">
    <span>✦ Tetris Editor</span>
    <button id="theme-toggle" onclick="toggleTheme()">☀ LIGHT</button>
  </div>
  <div id="tabs">
    <div class="tab active" onclick="switchTab('agile')">AGILE</div>
    <div class="tab" onclick="switchTab('waterfall')">WATERFALL</div>
    <div class="tab" onclick="switchTab('settled')">SETTLED</div>
    <div class="tab" onclick="switchTab('settings')">SETTINGS</div>
  </div>
  <div id="panel-body"></div>
  <div id="actions">
    <button class="action-btn secondary" onclick="exportPNG()">EXPORT PNG</button>
    <button class="action-btn primary" onclick="render()">RENDER</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// TETROMINO DEFINITIONS
// ─────────────────────────────────────────────
// All rotations for each Tetromino family
// Each entry is an array of rotations (each rotation = array of [dr,dc])
const ROTATIONS = {
  'I': [
    [[0,0],[0,1],[0,2],[0,3]],   // horizontal
    [[0,0],[1,0],[2,0],[3,0]],   // vertical
  ],
  'O': [
    [[0,0],[0,1],[1,0],[1,1]],   // only one rotation
  ],
  'T': [
    [[0,1],[1,0],[1,1],[1,2]],   // up
    [[0,0],[1,0],[1,1],[2,0]],   // right
    [[0,0],[0,1],[0,2],[1,1]],   // down
    [[0,1],[1,0],[1,1],[2,1]],   // left
  ],
  'S': [
    [[0,1],[0,2],[1,0],[1,1]],   // flat
    [[0,0],[1,0],[1,1],[2,1]],   // vertical
  ],
  'Z': [
    [[0,0],[0,1],[1,1],[1,2]],   // flat
    [[0,1],[1,0],[1,1],[2,0]],   // vertical
  ],
  'L': [
    [[0,0],[1,0],[2,0],[2,1]],   // vertical
    [[0,0],[0,1],[0,2],[1,0]],   // horizontal
    [[0,0],[0,1],[1,1],[2,1]],   // vertical flipped
    [[0,2],[1,0],[1,1],[1,2]],   // horizontal flipped
  ],
  'J': [
    [[0,1],[1,1],[2,0],[2,1]],   // vertical
    [[0,0],[1,0],[1,1],[1,2]],   // horizontal
    [[0,0],[0,1],[1,0],[2,0]],   // vertical flipped
    [[0,0],[0,1],[0,2],[1,2]],   // horizontal flipped
  ],
};

// Flat map for legacy compatibility
const PIECE_DEFS = {};
for (const [family, rots] of Object.entries(ROTATIONS)) {
  rots.forEach((cells, ri) => {
    const key = family + (rots.length > 1 ? ri : '');
    PIECE_DEFS[key] = cells;
  });
}

// Piece state: family + rotation index
function pieceKey(p) {
  const rots = ROTATIONS[p.family];
  const ri = p.rot % rots.length;
  return p.family + (rots.length > 1 ? ri : '');
}

function rotatePiece(side, i, dir) {
  const p = state[side].pieces[i];
  const rots = ROTATIONS[p.family];
  p.rot = ((p.rot || 0) + dir + rots.length) % rots.length;
  buildPanel();
  render();
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const COLS = 10, ROWS = 20;

// State: each side has pieces (falling) and settled cells
let state = {
  agile: {
    pieces: [
      { family:'S', rot:0, row:7, col:7, ghostRow:14 }
    ],
    settled: new Set([
      '15,0','15,1','15,2','15,3','15,4','15,5','15,6','15,9',
      '16,0','16,1','16,4','16,8','16,9',
      '17,0','17,1','17,7','17,8','17,9',
      '18,0','18,1','18,2','18,6','18,7','18,8','18,9',
      '19,0','19,1','19,2','19,3','19,5','19,6','19,7','19,8','19,9',
    ]),
  },
  waterfall: {
    pieces: [
      { family:'S', rot:0, row:9, col:7, ghostRow:14 },
      { family:'O', rot:0, row:7, col:5, ghostRow:13 },
      { family:'T', rot:1, row:5, col:2, ghostRow:12 },
      { family:'L', rot:2, row:2, col:3, ghostRow:16 },
      { family:'I', rot:0, row:1, col:6, ghostRow:12 },
    ],
    settled: new Set([
      '15,0','15,1','15,2','15,3','15,4','15,5','15,6','15,9',
      '16,0','16,1','16,4','16,8','16,9',
      '17,0','17,1','17,7','17,8','17,9',
      '18,0','18,1','18,2','18,6','18,7','18,8','18,9',
      '19,0','19,1','19,2','19,3','19,5','19,6','19,7','19,8','19,9',
    ]),
  },
};

let currentTab = 'agile';
let isLightMode = false;

function setTheme(lightMode) {
  isLightMode = lightMode;
  document.body.classList.toggle('light-mode', lightMode);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = lightMode ? '🌙 DARK' : '☀ LIGHT';
  localStorage.setItem('tetris-editor-theme', lightMode ? 'light' : 'dark');
}

function toggleTheme() {
  setTheme(!isLightMode);
  render();
}

const savedTheme = localStorage.getItem('tetris-editor-theme');
if (savedTheme === 'light') setTheme(true);

// ─────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────
// ── Config (editable via SETTINGS tab) ──
const cfg = {
  cell:      40,
  boardY:    265,
  canvasW:   1440,
  canvasH:   1200,
  titleSize: 108,
  subSize:   40,
  vsSize:    82,
  titleGap:  24,
  titleL:    'AGILE',
  titleR:    'WATERFALL',
  subL:      'One piece at a time',
  subR:      'Plan everything upfront',
  colorL:    '#00d7af',
  colorR:    '#ff552d',
};
const SCALE = 0.5; // display scale

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = cfg.canvasW;
canvas.height = cfg.canvasH;
canvas.style.width  = cfg.canvasW * SCALE + 'px';
canvas.style.height = cfg.canvasH * SCALE + 'px';

const getMID = () => cfg.canvasW / 2;


function boardOrigin(cx, MID_unused) {
  return [cx - (COLS * cfg.cell) / 2, cfg.boardY];
}

// ─────────────────────────────────────────────
// DRAWING
// ─────────────────────────────────────────────


const CANVAS_THEMES = {
  dark: {
    bg: '#08080f',
    grid: 'rgba(255,255,255,0.05)',
    divider: 'rgba(60,60,100,0.8)',
    vs: 'rgba(60,60,90,0.9)',
    settledBase: 75,
    settledStep: 3,
  },
  light: {
    bg: '#f5f8ff',
    grid: 'rgba(35,50,85,0.15)',
    divider: 'rgba(120,140,180,0.7)',
    vs: 'rgba(95,110,145,0.85)',
    settledBase: 160,
    settledStep: 2,
  },
};

function getCanvasTheme() {
  return isLightMode ? CANVAS_THEMES.light : CANVAS_THEMES.dark;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function drawBlock(cx, col, row, x0, y0, color, alpha=1, dimF=1) {
  const px = x0 + col * cfg.cell;
  const py = y0 + row * cfg.cell;
  const p = 3;
  const [r,g,b] = hexToRgb(color);
  const dr = Math.round(r*dimF), dg = Math.round(g*dimF), db = Math.round(b*dimF);
  cx.save();
  cx.globalAlpha = alpha;
  // bright fill
  cx.fillStyle = `rgb(${dr},${dg},${db})`;
  cx.fillRect(px+p, py+p, cfg.cell-p*2, cfg.cell-p*2);
  // white border
  cx.strokeStyle = `rgba(255,255,255,0.7)`;
  cx.lineWidth = 1.5;
  cx.strokeRect(px+p+0.5, py+p+0.5, cfg.cell-p*2-1, cfg.cell-p*2-1);
  // strong top highlight
  cx.fillStyle = 'rgba(255,255,255,0.35)';
  cx.fillRect(px+p+2, py+p+2, cfg.cell-p*2-4, 6);
  // subtle bottom shadow
  cx.fillStyle = 'rgba(0,0,0,0.25)';
  cx.fillRect(px+p+2, py+cfg.cell-p-6, cfg.cell-p*2-4, 4);
  cx.restore();
}

function drawGhostBlock(cx, col, row, x0, y0, color) {
  const px = x0 + col * cfg.cell;
  const py = y0 + row * cfg.cell;
  const p = 3;
  const [r,g,b] = hexToRgb(color);
  cx.save();
  cx.fillStyle = `rgba(${r},${g},${b},0.08)`;
  cx.fillRect(px+p, py+p, cfg.cell-p*2, cfg.cell-p*2);
  cx.strokeStyle = `rgba(${r},${g},${b},0.6)`;
  cx.lineWidth = 2;
  cx.setLineDash([]);
  cx.strokeRect(px+p+1, py+p+1, cfg.cell-p*2-2, cfg.cell-p*2-2);
  cx.restore();
}

function drawDropLine(cx, col, rowFrom, rowTo, x0, y0, color) {
  if (rowTo <= rowFrom) return;
  const px = x0 + col * cfg.cell + cfg.cell / 2;
  const y1 = y0 + rowFrom * cfg.cell;
  const y2 = y0 + rowTo * cfg.cell;
  const [r,g,b] = hexToRgb(color);
  cx.save();
  cx.strokeStyle = `rgba(${r},${g},${b},0.35)`;
  cx.lineWidth = 1;
  cx.setLineDash([4,4]);
  cx.beginPath();
  cx.moveTo(px, y1);
  cx.lineTo(px, y2);
  cx.stroke();
  cx.setLineDash([]);
  cx.restore();
}

function drawGrid(cx, x0, y0, theme) {
  cx.save();
  cx.strokeStyle = theme.grid;
  cx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    cx.beginPath(); cx.moveTo(x0+c*cfg.cell, y0); cx.lineTo(x0+c*cfg.cell, y0+ROWS*cfg.cell); cx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    cx.beginPath(); cx.moveTo(x0, y0+r*cfg.cell); cx.lineTo(x0+COLS*cfg.cell, y0+r*cfg.cell); cx.stroke();
  }
  cx.restore();
}

function pieceCells(key, ar, ac) {
  return PIECE_DEFS[key].map(([dr,dc]) => [ar+dr, ac+dc]);
}

function drawPiece(cx, key, ar, ac, x0, y0, color, alpha=1, dimF=1) {
  for (const [row, col] of pieceCells(key, ar, ac)) {
    drawBlock(cx, col, row, x0, y0, color, alpha, dimF);
  }
}

function drawGhostPiece(cx, key, ar, ac, x0, y0, color) {
  for (const [row, col] of pieceCells(key, ar, ac)) {
    drawGhostBlock(cx, col, row, x0, y0, color);
  }
}

function drawDropLines(cx, key, fallRow, fallCol, ghostRow, x0, y0, color) {
  const fallCells  = pieceCells(key, fallRow, fallCol);
  const ghostCells = pieceCells(key, ghostRow, fallCol);
  const colFallBot = {}, colGhostTop = {};
  for (const [r,c] of fallCells)  colFallBot[c]  = Math.max(colFallBot[c]  ?? -1, r);
  for (const [r,c] of ghostCells) colGhostTop[c] = Math.min(colGhostTop[c] ?? 99,  r);
  for (const [col, bot] of Object.entries(colFallBot)) {
    const top = colGhostTop[col] ?? 99;
    drawDropLine(cx, +col, bot+1, top, x0, y0, color);
  }
}

function drawBoard(cx, side, x0, y0, color, theme) {
  const s = state[side];

  // settled — slate grey, same texture as falling pieces
  for (const key of s.settled) {
    const [row, col] = key.split(',').map(Number);
    const p = 3;
    const px = x0 + col * cfg.cell;
    const py = y0 + row * cfg.cell;
    // slightly darker toward bottom
    const fade = Math.round(theme.settledBase + (19 - row) * theme.settledStep);
    const base = fade;
    cx.save();
    cx.globalAlpha = 0.95;
    // fill
    cx.fillStyle = `rgb(${base},${base},${base})`;
    cx.fillRect(px+p, py+p, cfg.cell-p*2, cfg.cell-p*2);
    // white border
    cx.strokeStyle = `rgba(255,255,255,0.7)`;
    cx.lineWidth = 1.5;
    cx.strokeRect(px+p+0.5, py+p+0.5, cfg.cell-p*2-1, cfg.cell-p*2-1);
    // top highlight
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.fillRect(px+p+2, py+p+2, cfg.cell-p*2-4, 6);
    // bottom shadow
    cx.fillStyle = 'rgba(0,0,0,0.25)';
    cx.fillRect(px+p+2, py+cfg.cell-p-6, cfg.cell-p*2-4, 4);
    cx.restore();
  }

  // ghosts → drop lines → pieces
  for (const p of s.pieces) {
    drawGhostPiece(cx, pieceKey(p), p.ghostRow, p.col, x0, y0, color);
  }
  // drop lines removed
  for (const p of s.pieces) {
    drawPiece(cx, pieceKey(p), p.row, p.col, x0, y0, color);
  }
}


function buildSettingsPanel(body) {
  const groups = [
    { label: 'CANVAS', fields: [
      { key:'canvasW', label:'Width',  min:800,  max:3840, step:80 },
      { key:'canvasH', label:'Height', min:600,  max:2160, step:60 },
      { key:'cell',    label:'Block Size', min:24, max:72, step:2 },
      { key:'boardY',  label:'Board Top Y', min:80, max:400, step:4 },
    ]},
    { label: 'TYPOGRAPHY', fields: [
      { key:'titleSize', label:'Title Size',    min:36, max:140, step:4 },
      { key:'subSize',   label:'Subtitle Size', min:16, max:72,  step:2 },
      { key:'vsSize',    label:'VS Size',       min:24, max:100, step:4 },
      { key:'titleGap',  label:'Title↔Sub Gap',  min:0,  max:80,  step:2 },
    ]},
    { label: 'LEFT TEXT (AGILE)', fields: [
      { key:'titleL', label:'Title',    type:'text' },
      { key:'subL',   label:'Subtitle', type:'text' },
      { key:'colorL', label:'Color',    type:'color' },
    ]},
    { label: 'RIGHT TEXT (WATERFALL)', fields: [
      { key:'titleR', label:'Title',    type:'text' },
      { key:'subR',   label:'Subtitle', type:'text' },
      { key:'colorR', label:'Color',    type:'color' },
    ]},
  ];

  for (const group of groups) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = group.label;
    body.appendChild(lbl);

    for (const f of group.fields) {
      const wrap = document.createElement('div');
      wrap.className = 'field-group full';
      wrap.style.marginBottom = '6px';

      const type = f.type || 'number';

      if (type === 'number') {
        wrap.innerHTML = `
          <label>${f.label}</label>
          <div class="stepper">
            <button class="stepper-btn" onclick="stepCfg('${f.key}',${-(f.step||1)},${f.min},${f.max})">◀</button>
            <div class="stepper-val" id="cfg-${f.key}">${cfg[f.key]}</div>
            <button class="stepper-btn" onclick="stepCfg('${f.key}',${f.step||1},${f.min},${f.max})">▶</button>
          </div>`;
      } else if (type === 'text') {
        wrap.innerHTML = `
          <label>${f.label}</label>
          <input type="text" value="${cfg[f.key]}"
            style="width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-fg);font-family:monospace;font-size:11px;padding:4px 6px;border-radius:2px"
            oninput="cfg['${f.key}']=this.value; resizeCanvas(); render();">`;
      } else if (type === 'color') {
        wrap.innerHTML = `
          <label>${f.label}</label>
          <input type="color" value="${cfg[f.key]}"
            style="width:100%;height:28px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:2px;cursor:pointer;padding:1px"
            oninput="cfg['${f.key}']=this.value; render();">`;
      }
      body.appendChild(wrap);
    }
  }
}

function stepCfg(key, delta, min, max) {
  cfg[key] = Math.max(min, Math.min(max, cfg[key] + delta));
  const el = document.getElementById('cfg-' + key);
  if (el) el.textContent = cfg[key];
  resizeCanvas();
  render();
}

function resizeCanvas() {
  canvas.width  = cfg.canvasW;
  canvas.height = cfg.canvasH;
  canvas.style.width  = cfg.canvasW * SCALE + 'px';
  canvas.style.height = cfg.canvasH * SCALE + 'px';
}

function render() {
  const canvasTheme = getCanvasTheme();
  ctx.fillStyle = canvasTheme.bg;
  ctx.fillRect(0, 0, cfg.canvasW, cfg.canvasH);

  const MID = getMID();
  const AGILE_CX = MID / 2;
  const WF_CX    = MID + MID / 2;
  const AGILE_COL = cfg.colorL;
  const WF_COL    = cfg.colorR;
  const BOARD_H   = ROWS * cfg.cell;
  const subY      = cfg.boardY - 12;
  const titleY    = subY - cfg.subSize - cfg.titleGap;
  const vsY       = cfg.boardY + BOARD_H / 2 + cfg.vsSize / 3;

  // divider
  ctx.save();
  ctx.strokeStyle = canvasTheme.divider;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(MID, 80); ctx.lineTo(MID, cfg.canvasH-80); ctx.stroke();
  ctx.restore();

  // VS
  ctx.save();
  ctx.font = `bold ${cfg.vsSize}px Courier New`;
  ctx.fillStyle = canvasTheme.vs;
  ctx.textAlign = 'center';
  ctx.fillText('VS', MID, vsY);
  ctx.restore();

  // titles
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${cfg.titleSize}px Courier New`;
  ctx.fillStyle = AGILE_COL;
  ctx.fillText(cfg.titleL, AGILE_CX, titleY);
  ctx.fillStyle = WF_COL;
  ctx.fillText(cfg.titleR, WF_CX, titleY);
  ctx.font = `${cfg.subSize}px Courier New`;
  ctx.fillStyle = AGILE_COL + '99';
  ctx.fillText(cfg.subL, AGILE_CX, subY);
  ctx.fillStyle = WF_COL + '99';
  ctx.fillText(cfg.subR, WF_CX, subY);
  ctx.restore();

  const [ax0, ay0] = boardOrigin(AGILE_CX);
  const [wx0, wy0] = boardOrigin(WF_CX);

  drawGrid(ctx, ax0, ay0, canvasTheme);
  drawGrid(ctx, wx0, wy0, canvasTheme);

  drawBoard(ctx, 'agile', ax0, ay0, AGILE_COL, canvasTheme);
  drawBoard(ctx, 'waterfall', wx0, wy0, WF_COL, canvasTheme);

  // legend removed

  buildPanel();
}

// ─────────────────────────────────────────────
// PANEL UI
// ─────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['agile','waterfall','settled','settings'][i] === tab);
  });
  buildPanel();
}

const PIECE_COLORS_HEX = {
  agile: '#00d7af',
  waterfall: '#ff552d',
};

function buildPanel() {
  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  if (currentTab === 'settled') { buildSettledPanel(body); return; }
  if (currentTab === 'settings') { buildSettingsPanel(body); return; }

  const side = currentTab; // 'agile' or 'waterfall'
  const color = PIECE_COLORS_HEX[side];
  const pieces = state[side].pieces;

  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = 'Falling Pieces';
  body.appendChild(label);

  pieces.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'piece-card';

    const pk = pieceKey(p);
    card.innerHTML = `
      <div class="piece-card-header">
        <div class="piece-badge" style="background:${color}">${i+1}</div>
        <div class="piece-name">${p.family} <span style="color:var(--muted)">rot:${p.rot||0}</span></div>
        <div class="piece-delete" onclick="deletePiece('${side}',${i})">✕</div>
      </div>
      <div class="piece-fields">
        <div class="field-group full">
          <label>SHAPE</label>
          <div style="display:flex;gap:4px;align-items:center">
            <select style="flex:1;background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-fg);font-family:monospace;font-size:11px;padding:3px 5px;border-radius:2px"
              onchange="updateFamily('${side}',${i},this.value)">
              ${Object.keys(ROTATIONS).map(f =>
                `<option ${f===p.family?'selected':''}>${f}</option>`).join('')}
            </select>
            <button class="dpad-btn" style="width:36px" onclick="rotatePiece('${side}',${i},-1)" title="反向旋轉">↺</button>
            <button class="dpad-btn" style="width:36px" onclick="rotatePiece('${side}',${i},+1)" title="旋轉">↻</button>
          </div>
        </div>

        <div class="field-group full">
          <div class="dpad-pair">
            <div class="dpad-col">
              <label>PIECE</label>
              <div class="dpad-wrap">
                <div class="dpad-row">
                  <button class="dpad-btn" onclick="stepPiece('${side}',${i},'row',-1)">▲</button>
                </div>
                <div class="dpad-row">
                  <button class="dpad-btn" onclick="stepPiece('${side}',${i},'col',-1)">◀</button>
                  <div class="dpad-center">
                    <div class="dpad-coords">${p.row},${p.col}</div>
                  </div>
                  <button class="dpad-btn" onclick="stepPiece('${side}',${i},'col',+1)">▶</button>
                </div>
                <div class="dpad-row">
                  <button class="dpad-btn" onclick="stepPiece('${side}',${i},'row',+1)">▼</button>
                </div>
              </div>
            </div>
            <div class="dpad-divider"></div>
            <div class="dpad-col">
              <label>GHOST</label>
              <div class="dpad-wrap">
                <div class="dpad-row">
                  <button class="dpad-btn ghost-btn" onclick="stepPiece('${side}',${i},'ghostRow',-1)">▲</button>
                </div>
                <div class="dpad-row">
                  <div class="dpad-center">
                    <div class="dpad-coords" id="val-${side}-${i}-ghostRow">${p.ghostRow}</div>
                  </div>
                </div>
                <div class="dpad-row">
                  <button class="dpad-btn ghost-btn" onclick="stepPiece('${side}',${i},'ghostRow',+1)">▼</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="field-group full">
          <button class="add-btn" onclick="autoGhost('${side}',${i})">↓ AUTO GHOST</button>
        </div>
      </div>
    `;
    body.appendChild(card);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = '+ ADD PIECE';
  addBtn.onclick = () => addPiece(side);
  body.appendChild(addBtn);

  // ghost order hint
  const hint = document.createElement('div');
  hint.className = 'section-label';
  hint.style.marginTop = '16px';
  hint.textContent = 'Ghost order: piece 1 lands first (lowest)';
  body.appendChild(hint);
}

function buildSettledPanel(body) {
  const side = currentTab === 'settled' ? 'waterfall' : currentTab;

  ['agile','waterfall'].forEach(s => {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = s.toUpperCase() + ' — click to toggle';
    body.appendChild(label);

    const color = PIECE_COLORS_HEX[s];

    // Column headers
    const colHeaders = document.createElement('div');
    colHeaders.style.cssText = 'display:flex;gap:3px;margin-left:25px;margin-bottom:4px';
    for (let col = 0; col < COLS; col++) {
      const h = document.createElement('div');
      h.className = 'grid-col-header';
      h.textContent = col;
      colHeaders.appendChild(h);
    }
    body.appendChild(colHeaders);

    // Show rows 10-19 for editing
    for (let row = 10; row < ROWS; row++) {
      const rowWrap = document.createElement('div');
      rowWrap.style.cssText = 'display:flex;align-items:center;gap:3px;margin-bottom:3px';

      const rowLabel = document.createElement('div');
      rowLabel.className = 'grid-row-label';
      rowLabel.textContent = row;
      rowWrap.appendChild(rowLabel);

      for (let col = 0; col < COLS; col++) {
        const filled = state[s].settled.has(`${row},${col}`);
        const cell = document.createElement('div');
        cell.className = 'grid-cell' + (filled ? ' filled' : '');
        cell.style.background = filled ? color + '55' : 'var(--cell-bg)';
        cell.title = `row ${row}, col ${col}`;
        cell.onclick = () => {
          const k = `${row},${col}`;
          if (state[s].settled.has(k)) {
            state[s].settled.delete(k);
            cell.classList.remove('filled');
            cell.style.background = 'var(--cell-bg)';
            cell.style.borderColor = 'var(--cell-border)';
          } else {
            state[s].settled.add(k);
            cell.classList.add('filled');
            cell.style.background = color + '55';
            cell.style.borderColor = color + '88';
          }
          render();
        };
        rowWrap.appendChild(cell);
      }
      body.appendChild(rowWrap);
    }
  });
}

// ─────────────────────────────────────────────
// STATE MUTATIONS
// ─────────────────────────────────────────────
function updatePiece(side, i, field, val) {
  state[side].pieces[i][field] = val;
  render();
}

function updateFamily(side, i, family) {
  state[side].pieces[i].family = family;
  state[side].pieces[i].rot = 0;
  buildPanel();
  render();
}

function stepPiece(side, i, field, delta) {
  const limits = { row: [0,18], col: [0,9], ghostRow: [0,19] };
  const [min, max] = limits[field] || [0, 99];
  const cur = state[side].pieces[i][field];
  const next = Math.max(min, Math.min(max, cur + delta));
  state[side].pieces[i][field] = next;
  // update coords display
  const p = state[side].pieces[i];
  // find the coords div in the card (no id, use buildPanel to refresh)
  // for ghostRow we have an id
  const ghostEl = document.getElementById(`val-${side}-${i}-ghostRow`);
  if (ghostEl) ghostEl.textContent = p.ghostRow;
  // for row/col, rebuild panel to update coords display
  if (field === 'row' || field === 'col') buildPanel();
  render();
}

function deletePiece(side, i) {
  state[side].pieces.splice(i, 1);
  render();
}

function addPiece(side) {
  state[side].pieces.push({ family:'O', rot:0, row:3, col:4, ghostRow:16 });
  render();
}

function autoGhost(side, i) {
  const p = state[side].pieces[i];
  const settled = state[side].settled;
  const blocked = new Set(settled);

  // Also block all other pieces' ghosts
  state[side].pieces.forEach((op, j) => {
    if (j === i) return;
    for (const [dr,dc] of PIECE_DEFS[pieceKey(op)]) {
      blocked.add(`${op.ghostRow+dr},${op.col+dc}`);
    }
  });

  let r = p.row;
  while (true) {
    const next = r + 1;
    let blocked_flag = false;
    for (const [dr,dc] of PIECE_DEFS[pieceKey(p)]) {
      const tr = next+dr, tc = p.col+dc;
      if (tr >= ROWS || blocked.has(`${tr},${tc}`)) { blocked_flag = true; break; }
    }
    if (blocked_flag) break;
    r = next;
  }
  state[side].pieces[i].ghostRow = r;
  render();
}

  const dataURL = canvas.toDataURL('image/png');

  // Open in new tab — user can right-click → Save Image
  const win = window.open('', '_blank');
  if (win) {
    win.document.write(`
      <html><body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;padding:20px;font-family:monospace">
        <p style="color:#aaa;margin-bottom:12px;font-size:13px">右鍵圖片 → 另存圖片 (Right-click → Save image as)</p>
        <img src="${dataURL}" style="max-width:100%;border:1px solid #333">
      </body></html>
    `);
    win.document.close();
  } else {
    // fallback: show modal overlay inside current page
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';
    overlay.innerHTML = `
      <p style="color:#aaa;font-family:monospace;font-size:13px;margin-bottom:12px">右鍵圖片 → 另存圖片</p>
      <img src="${dataURL}" style="max-width:90vw;max-height:80vh;border:1px solid #333">
      <button onclick="this.parentElement.remove()" style="margin-top:14px;padding:8px 24px;background:#222;color:#aaa;border:1px solid #444;font-family:monospace;cursor:pointer;border-radius:3px">✕ 關閉</button>
    `;
    document.body.appendChild(overlay);
  }
}
